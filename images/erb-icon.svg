<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- dark background circle with cyan border -->
  <circle cx="20" cy="20" r="19" fill="#1a1a2e" stroke="#00b4ff" stroke-width="1.5"/>
  <!-- tower legs -->
  <line x1="20" y1="14" x2="13" y2="32" stroke="#00b4ff" stroke-width="1.4"/>
  <line x1="20" y1="14" x2="27" y2="32" stroke="#00b4ff" stroke-width="1.4"/>
  <!-- cross-braces -->
  <line x1="15" y1="25" x2="25" y2="25" stroke="#00b4ff" stroke-width="1.2" opacity="0.7"/>
  <line x1="14.5" y1="29" x2="25.5" y2="29" stroke="#00b4ff" stroke-width="1.2" opacity="0.7"/>
  <!-- base bar -->
  <line x1="11" y1="32" x2="29" y2="32" stroke="#00b4ff" stroke-width="1.5"/>
  <!-- antenna mast -->
  <line x1="20" y1="14" x2="20" y2="8" stroke="#00b4ff" stroke-width="1.5"/>
  <!-- signal arcs -->
  <path d="M 16.5,11.5 A 4,4 0 0,1 23.5,11.5" fill="none" stroke="#00b4ff" stroke-width="1.3"/>
  <path d="M 14,9.5  A 7,7 0 0,1 26,9.5"    fill="none" stroke="#00b4ff" stroke-width="1.1" opacity="0.55"/>
</svg>
